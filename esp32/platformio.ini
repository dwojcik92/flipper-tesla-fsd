[platformio]
src_dir = .firmware

[env:m5stack-atom]
platform = espressif32
board = m5stack-atom
framework = arduino
monitor_speed = 115200
build_flags =
    -D BOARD_M5STACK_ATOM
    -D CAN_DRIVER_TWAI
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    Links2004/WebSockets@^2.4.0

[env:m5stack-atom-swap-pins]
platform = espressif32
board = m5stack-atom
framework = arduino
monitor_speed = 115200
build_flags =
    -D BOARD_M5STACK_ATOM
    -D CAN_DRIVER_TWAI
    -D PIN_CAN_TX=19
    -D PIN_CAN_RX=22
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    Links2004/WebSockets@^2.4.0

[env:esp32-mcp2515]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -D BOARD_ESP32_GENERIC
    -D CAN_DRIVER_MCP2515
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    autowp/autowp-mcp2515@^1.3.0
    Links2004/WebSockets@^2.4.0

[env:esp32-lilygo]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -D BOARD_LILYGO
    -D CAN_DRIVER_TWAI
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    Links2004/WebSockets@^2.4.0

[env:waveshare-s3-can]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.flash_size = 8MB
board_build.flash_mode = qio
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608

build_flags =
    -D BOARD_WAVESHARE_S3
    -D CAN_DRIVER_TWAI
    -D PIN_CAN_TX=15
    -D PIN_CAN_RX=16
    -D PIN_LED=46
    -D PIN_BUTTON=0
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1

lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    Links2004/WebSockets@^2.4.0

[env:feather_rp2040_can]
; Adafruit Feather RP2040 CAN — MCP25625 (MCP2515-compatible) on SPI1
; Target: Tesla Model 3 HW3
; Flash with: pio run -e feather_rp2040_can -t upload
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = adafruit_feather_can
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200
build_flags =
    ; ── Board / hardware ──────────────────────────────────────────
    -D BOARD_FEATHER_RP2040_CAN
    -D CAN_DRIVER_MCP2515
    ; ── Vehicle hardware version (pick ONE) ──────────────────────
    -D HW3                          ; Model 3 / Y HW3 (AMD)
    ;-D HW4                         ; Model 3 / Y HW4 — uncomment if HW4
    ;-D LEGACY                      ; HW1/HW2 retrofit — uncomment if Legacy
    ; ── Feature flags (uncomment to enable at compile time) ──────
    ;-D FORCE_FSD                   ; Always activate FSD — skip the car's UI toggle
    ;                               ;   OFF by default. Enable if you always want FSD
    ;                               ;   active without selecting it in the car UI.
    ; -D NAG_KILLER                   ; Suppress hands-on-wheel reminder via 0x370
    ;                               ;   PRNG organic-torque echo (1.0–2.4 Nm random
    ;                               ;   walk + grip pulses). DAS-aware.
    ;-D PRECONDITION                ; Inject 0x082 every 500 ms to trigger battery
    ;                               ;   preconditioning. OFF by default.
    ;-D TLSSC_RESTORE               ; Spoof 0x331 DAS config to restore TLSSC tier.
    ;                               ;   OFF by default. Only needed if your car's
    ;                               ;   Traffic-Light-and-Stop-Sign tier was downgraded.
    ; -D SUMMON_EU_UNLOCK            ; "Summon EU Unlock HW3" — set_bit 19=0 + bit 46=1 on
    ;                               ;   mux=1 (rule 1021). Removes the EU regulatory
    ;                               ;   distance cap on Smart Summon.
    ;                               ;   Source: ev-open-can-tools/summon-eu-unlock-hw3.json    
    ;-D ULC_CONFIRM_DISABLE         ; Clear bit1 of 0x3F8 (DAS_followDistance) to remove
    ;                               ;   the "require blinker tap" confirmation on
    ;                               ;   Navigate-on-Autopilot lane changes. Car will
    ;                               ;   auto-confirm without a stalk press.
    ; ── Safety / testing ─────────────────────────────────────────
    -D PASSIVE_MODE                ; *** WIRING TEST ONLY *** — forces listen-only and
    ;                               ;   disables ALL CAN TX. Safe to plug in without
    ;                               ;   affecting the vehicle. Remove before real use.
lib_deps =
    autowp/autowp-mcp2515@^1.3.0
    adafruit/Adafruit NeoPixel@^1.12.0
